name: Deploy

on:
  push:

jobs:
  build-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            verification-licences
          # generate Docker tags based on the following events/attributes
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - run: docker images

  deploy:
    needs: [ build-docker-image ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download bin artifact
        uses: actions/download-artifact@master
        with:
          name: bin
          path: ./
      - name: Download WASM bindings
        uses: actions/download-artifact@master
        with:
          name: wasm-bindings
          path: ./public/static/pkg
      - name: Download CSS
        uses: actions/download-artifact@master
        with:
          name: styles.css
          path: ./public/static/styles.css
      - name: List files
        run: ls -al
      - name: List static files
        run: ls -al ./public/static
      - name: List pkg files
        run: ls -al ./public/static/pkg
      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "Rocket.toml verification-licences public"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: ${{ secrets.REMOTE_TARGET }}
